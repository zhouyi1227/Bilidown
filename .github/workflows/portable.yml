name: Portable builds

on:
  workflow_dispatch:
    inputs:
      artifact_version:
        description: "Artifact label; leave blank for dev-<short SHA>"
        required: false
        type: string
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

permissions:
  contents: read

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      artifact_version: ${{ steps.version.outputs.artifact_version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - id: version
        name: Validate version
        env:
          REQUESTED_VERSION: ${{ inputs.artifact_version }}
        run: |
          project_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          package_version="$(PYTHONPATH=backend python -c 'import bilidown; print(bilidown.__version__)')"
          test "$project_version" = "$package_version"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            artifact_version="${GITHUB_REF_NAME#v}"
            [[ "$artifact_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]
            test "$artifact_version" = "$project_version"
          elif [[ -n "$REQUESTED_VERSION" ]]; then
            artifact_version="$REQUESTED_VERSION"
          else
            artifact_version="dev-${GITHUB_SHA:0:7}"
          fi
          [[ "$artifact_version" =~ ^[0-9A-Za-z][0-9A-Za-z.+-]*$ ]]
          echo "artifact_version=$artifact_version" >> "$GITHUB_OUTPUT"

  quality:
    uses: ./.github/workflows/ci.yml

  windows:
    needs: [prepare, quality]
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install -e ".[dev]"
      - name: Prepare pinned FFmpeg
        shell: pwsh
        run: packaging\prepare-ffmpeg.ps1
      - name: Build portable directory and archive
        shell: pwsh
        run: packaging\build-portable.ps1 -Python python -ArtifactVersion "${{ needs.prepare.outputs.artifact_version }}"
      - name: Smoke-test packaged application
        run: python packaging/smoke-portable.py --executable dist/Bilidown/Bilidown.exe
      - uses: actions/upload-artifact@v4
        with:
          name: Bilidown-windows-x64
          path: |
            dist/Bilidown-${{ needs.prepare.outputs.artifact_version }}-windows-x64.zip
            dist/Bilidown-${{ needs.prepare.outputs.artifact_version }}-windows-x64.zip.sha256
          retention-days: 14
          if-no-files-found: error

  macos:
    needs: [prepare, quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install build dependencies
        run: |
          brew install nasm pkg-config
          python -m pip install -e ".[dev]"
      - name: Import optional Apple signing certificate
        run: |
          if [[ -n "$APPLE_CERTIFICATE_BASE64" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_TEAM_ID" && -n "$APPLE_ID" && -n "$APPLE_APP_PASSWORD" ]]; then
            keychain="$RUNNER_TEMP/bilidown-signing.keychain-db"
            password="$(uuidgen)"
            printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/certificate.p12"
            security create-keychain -p "$password" "$keychain"
            security set-keychain-settings -lut 21600 "$keychain"
            security unlock-keychain -p "$password" "$keychain"
            security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$password" "$keychain"
            security list-keychains -d user -s "$keychain" login.keychain-db
            identity="$(security find-identity -v -p codesigning "$keychain" | awk -F'"' 'NR==1 {print $2}')"
            test -n "$identity"
            echo "BILIDOWN_CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
            echo "BILIDOWN_NOTARIZE=1" >> "$GITHUB_ENV"
          else
            echo "BILIDOWN_NOTARIZE=0" >> "$GITHUB_ENV"
          fi
      - name: Build native FFmpeg
        run: bash packaging/prepare-ffmpeg-macos.sh
      - name: Build and sign application
        env:
          ARTIFACT_VERSION: ${{ needs.prepare.outputs.artifact_version }}
          PYTHON: python
        run: bash packaging/build-portable.sh
      - name: Notarize and staple when credentials are available
        if: env.BILIDOWN_NOTARIZE == '1'
        env:
          ARTIFACT_VERSION: ${{ needs.prepare.outputs.artifact_version }}
        run: |
          archive="dist/Bilidown-$ARTIFACT_VERSION-macos-${{ matrix.arch }}.app.zip"
          xcrun notarytool submit "$archive" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "dist/Bilidown.app"
          rm -f "$archive" "$archive.sha256"
          ditto -c -k --sequesterRsrc --keepParent "dist/Bilidown.app" "$archive"
          shasum -a 256 "$archive" | sed 's#  .*/#  #' > "$archive.sha256"
      - name: Verify application bundle
        env:
          ARTIFACT_VERSION: ${{ needs.prepare.outputs.artifact_version }}
        run: |
          test "$(uname -m)" = "${{ matrix.arch }}"
          test "$(plutil -extract LSMinimumSystemVersion raw dist/Bilidown.app/Contents/Info.plist)" = "13.0"
          lipo -archs dist/Bilidown.app/Contents/MacOS/Bilidown | grep -qw "${{ matrix.arch }}"
          codesign --verify --deep --strict --verbose=2 dist/Bilidown.app
          otool -L .tools/ffmpeg/bin/ffmpeg
          if [[ "$BILIDOWN_NOTARIZE" == "1" ]]; then
            xcrun stapler validate dist/Bilidown.app
            echo "Developer ID signed, notarized, and stapled" > "dist/SIGNING_STATUS-macos-${{ matrix.arch }}.txt"
          else
            echo "Ad-hoc signed; not notarized" > "dist/SIGNING_STATUS-macos-${{ matrix.arch }}.txt"
          fi
          python packaging/smoke-portable.py --executable dist/Bilidown.app/Contents/MacOS/Bilidown
      - uses: actions/upload-artifact@v4
        with:
          name: Bilidown-macos-${{ matrix.arch }}
          path: |
            dist/Bilidown-${{ needs.prepare.outputs.artifact_version }}-macos-${{ matrix.arch }}.app.zip
            dist/Bilidown-${{ needs.prepare.outputs.artifact_version }}-macos-${{ matrix.arch }}.app.zip.sha256
            dist/SIGNING_STATUS-macos-${{ matrix.arch }}.txt
          retention-days: 14
          if-no-files-found: error

  sources:
    needs: [prepare, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Collect corresponding third-party sources
        env:
          ARTIFACT_VERSION: ${{ needs.prepare.outputs.artifact_version }}
        run: |
          mkdir -p third-party-sources dist
          curl -fL --retry 3 -o third-party-sources/ffmpeg-8.1.2.tar.xz https://ffmpeg.org/releases/ffmpeg-8.1.2.tar.xz
          echo "464beb5e7bf0c311e68b45ae2f04e9cc2af88851abb4082231742a74d97b524c  third-party-sources/ffmpeg-8.1.2.tar.xz" | sha256sum --check
          curl -fL --retry 3 -o third-party-sources/lame-3.100.tar.gz https://downloads.sourceforge.net/project/lame/lame/3.100/lame-3.100.tar.gz
          echo "ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e  third-party-sources/lame-3.100.tar.gz" | sha256sum --check
          curl -fL --retry 3 -o third-party-sources/ffmpeg-150f7d15df-source.tar.gz https://codeload.github.com/FFmpeg/FFmpeg/tar.gz/150f7d15df
          curl -fL --retry 3 -o third-party-sources/btbn-autobuild-2026-07-14-13-19-source.tar.gz https://codeload.github.com/BtbN/FFmpeg-Builds/tar.gz/autobuild-2026-07-14-13-19
          cp packaging/FFMPEG_SOURCE.txt packaging/THIRD_PARTY_NOTICES.txt third-party-sources/
          (cd third-party-sources && sha256sum ./* > SOURCE_SHA256SUMS.txt)
          python -m zipfile -c "dist/Bilidown-$ARTIFACT_VERSION-third-party-sources.zip" third-party-sources
          sha256sum "dist/Bilidown-$ARTIFACT_VERSION-third-party-sources.zip" | sed 's#  .*/#  #' > "dist/Bilidown-$ARTIFACT_VERSION-third-party-sources.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: Bilidown-third-party-sources
          path: |
            dist/Bilidown-${{ needs.prepare.outputs.artifact_version }}-third-party-sources.zip
            dist/Bilidown-${{ needs.prepare.outputs.artifact_version }}-third-party-sources.zip.sha256
          retention-days: 14
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare, windows, macos, sources]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          pattern: Bilidown-*
          path: release-assets
          merge-multiple: true
      - name: Create combined checksum manifest
        run: |
          cd release-assets
          sha256sum ./*.zip | sed 's#  \./#  #' > SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          options=(--generate-notes --title "Bilidown $GITHUB_REF_NAME")
          [[ "$GITHUB_REF_NAME" == *-rc.* ]] && options+=(--prerelease)
          gh release create "$GITHUB_REF_NAME" release-assets/*.zip release-assets/SHA256SUMS.txt release-assets/SIGNING_STATUS-*.txt "${options[@]}"
