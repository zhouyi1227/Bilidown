name: CI

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run strict Python type-check
        run: basedpyright
      - name: Run backend and documentation tests
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile
      - name: Install backend schema dependencies
        run: python -m pip install -e .
      - name: Type-check, test, and build
        run: |
          pnpm --dir frontend schema:check
          pnpm --dir frontend typecheck
          pnpm --dir frontend test
          pnpm --dir frontend build
      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install --with-deps chromium
      - name: Run browser tests
        run: pnpm --dir frontend test:e2e

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            experimental: false
          - os: macos-26
            experimental: false
          - os: xcode-27
            experimental: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Record Apple build environment
        if: runner.os == 'macOS'
        run: |
          sw_vers
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version
          rustc -vV
      - name: Create sidecar placeholder for compile checks
        shell: bash
        run: |
          target="$(rustc -vV | sed -n 's/^host: //p')"
          suffix=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          mkdir -p src-tauri/binaries
          touch "src-tauri/binaries/bilidown-backend-${target}${suffix}"
      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt --all --check
      - name: Run strict Rust lint
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: Link against the preview Apple SDK
        if: matrix.experimental
        working-directory: src-tauri
        run: cargo build --all-targets --locked
      - name: Verify generated files are ignored
        shell: bash
        run: |
          dirty="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$dirty" ]]; then
            printf '%s\n' "$dirty"
            exit 1
          fi
