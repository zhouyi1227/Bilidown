name: CI

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run strict Python type-check
        run: basedpyright
      - name: Run backend and documentation tests
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile
      - name: Type-check, test, and build
        run: |
          pnpm --dir frontend schema:check
          pnpm --dir frontend typecheck
          pnpm --dir frontend test
          pnpm --dir frontend build
      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install --with-deps chromium
      - name: Run browser tests
        run: pnpm --dir frontend test:e2e
